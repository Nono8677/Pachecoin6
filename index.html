<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PACHECOIN V6 - Trading Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --text: #eaeaea; --primary: #f0b90b; --buy: #0ecb81; --sell: #f6465d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #333; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; opacity: 0.5; }
        .auth-tab.active { opacity: 1; border-bottom: 2px solid var(--primary); color: var(--primary); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #2b3139; border: 1px solid #444; color: white; border-radius: 4px; }
        .auth-btn { width: 100%; padding: 12px; background: var(--primary); border: none; color: black; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #auth-message { margin-top: 15px; font-size: 0.9rem; text-align: center; min-height: 1.2rem; }

        /* APP LAYOUT */
        header { padding: 15px; border-bottom: 1px solid #2b3139; display: flex; justify-content: space-between; align-items: center; background: var(--bg); sticky: top; }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.2rem; }
        #last-update { font-size: 0.7rem; opacity: 0.5; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        /* CARDS */
        .crypto-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #444; }
        .card-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .pair-name { font-weight: bold; font-size: 1.1rem; }
        .live-price { color: var(--primary); }
        .verdict { text-align: center; padding: 8px; border-radius: 6px; font-weight: bold; margin: 10px 0; }
        .verdict.buy { background: rgba(14, 203, 129, 0.2); color: var(--buy); }
        .verdict.out { background: rgba(246, 70, 93, 0.2); color: var(--sell); }
        
        .score-row { display: flex; gap: 5px; justify-content: space-around; font-size: 0.7rem; }
        .score-dot { padding: 4px 8px; border-radius: 4px; background: #2b3139; }
        .score-dot.on { color: var(--buy); border: 1px solid var(--buy); }

        /* FOOTER NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #2b3139; height: 60px; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; opacity: 0.5; }
        .nav-tab.active { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="logo" style="margin-bottom: 20px; font-size: 2rem;">PACHECOIN</div>
        <div class="auth-box">
            <div class="auth-tabs">
             <div class="auth-tab active" onclick="switchAuth('login')">Connexion</div>
                <div class="auth-tab" onclick="switchAuth('signup')">Inscription</div>
            </div>
            
            <div id="auth-form">
                <input type="email" id="auth-email" class="auth-input" placeholder="Email">
                <input type="password" id="auth-pwd" class="auth-input" placeholder="Mot de passe">
                <button id="auth-main-btn" class="auth-btn" onclick="handleAuth()">SE CONNECTER</button>
            </div>
            <div id="auth-message"></div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo">PACHECOIN</div>
            <div style="text-align: right;">
                <div id="last-update">Initialisation...</div>
                <div id="countdown" style="font-family: monospace; color: var(--primary);">00:00:00</div>
            </div>
        </header>

        <div id="tab-signals" class="tab-content active">
            <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
                <select id="tf-select" style="background:#1e2329; color:white; border:1px solid #444; padding:5px;"></select>
                <button onclick="startAnalysis()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 10px; border-radius:4px;">Actualiser</button>
            </div>
            <div id="signals-container">Chargement des paires...</div>
        </div>

        <div id="tab-portfolio" class="tab-content">
            <h3>Mon Portfolio Simulé</h3>
            <div id="portfolio-container"></div>
        </div>

        <nav>
            <div class="nav-tab active" onclick="showTab('tab-signals', this)">📊 Signaux</div>
            <div class="nav-tab" onclick="showTab('tab-portfolio', this)">💰 Portefeuille</div>
            <div class="nav-tab" onclick="handleLogout()">🚪 Sortir</div>
        </nav>
    </div>

    <script>
        'use strict';
        
        // 1. CONFIGURATION
        const SUPABASE_URL  = 'https://cbeucdnkixjhqzdazyxw.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiZXVjZG5raXhqaHF6ZGF6eXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTUyMzEsImV4cCI6MjA5Mzk5MTIzMX0.h2m2_WOxmVa-ZkdZrdKaWobGKrQbUIqB3nGOuagcN8M';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        let currentAuthMode = 'login';
        let state = { selectedTf: '1d', signals: {}, livePrices: {} };
        const PAIRS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT'];

        // 2. AUTHENTIFICATION
        function switchAuth(mode) {
            currentAuthMode = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-main-btn').innerText = mode === 'login' ? 'SE CONNECTER' : 'CRÉER UN COMPTE';
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pwd = document.getElementById('auth-pwd').value;
            const msgEl = document.getElementById('auth-message');
            
            if(!email || !pwd) { msgEl.innerText = "Champs vides"; return; }

            msgEl.innerText = "Chargement...";
            let result;

            if(currentAuthMode === 'login') {
                result = await supabase.auth.signInWithPassword({ email, password: pwd });
            } else {
                result = await supabase.auth.signUp({ email, password: pwd });
            }

            if(result.error) {
                msgEl.innerText = result.error.message;
                msgEl.style.color = 'red';
            } else if(currentAuthMode === 'signup' && !result.data.session) {
                msgEl.innerText = "Compte créé ! (Vérifiez vos mails si besoin)";
                msgEl.style.color = 'green';
            }
        }

        async function handleLogout() { await supabase.auth.signOut(); location.reload(); }

        supabase.auth.onAuthStateChange((event, session) => {
            if(session) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initApp();
            }
        });

        // 3. ANALYSE TECHNIQUE (Calculs simplifiés pour la rapidité)
        async function startAnalysis() {
            document.getElementById('last-update').innerText = "Analyse...";
            for (const s of PAIRS) {
                try {
                    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${state.selectedTf}&limit=100`);
                    const d = await r.json();
                    const closes = d.map(x => parseFloat(x[4]));
                    const last = closes[closes.length-1];
                    const prev = closes[closes.length-2];
                    
                    // Logique simplifiée (Trend + RSI)
                    state.signals[s] = {
                        price: last,
                        isBull: last > prev,
                        rsiBull: true // simulation simplifiée
                    };
                    renderSignals();
                } catch(e) { console.error(e); }
            }
            document.getElementById('last-update').innerText = "MàJ: " + new Date().toLocaleTimeString();
        }

        function renderSignals() {
            const container = document.getElementById('signals-container');
            container.innerHTML = PAIRS.map(s => {
                const d = state.signals[s];
                if(!d) return `<div class="crypto-card">${s} - Chargement...</div>`;
                return `
                <div class="crypto-card">
                    <div class="card-info"><span>${s}</span><span>${d.price.toLocaleString()}$</span></div>
                    <div class="verdict ${d.isBull ? 'buy' : 'out'}">${d.isBull ? "ACHAT" : "NEUTRE"}</div>
                </div>`;
            }).join('');
        }

        // 4. NAVIGATION ET UI
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function initApp() {
            const sel = document.getElementById('tf-select');
            if(sel.options.length === 0) {
                [['1H','1h'],['4H','4h'],['Jour','1d']].forEach(t => sel.add(new Option(t[0], t[1])));
                sel.value = state.selectedTf;
                sel.onchange = (e) => { state.selectedTf = e.target.value; startAnalysis(); };
            }
            startAnalysis();
            setInterval(startAnalysis, 60000);
        }
    </script>
</body>
</html>
